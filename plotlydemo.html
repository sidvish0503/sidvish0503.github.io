<html>
  <head>
    <title>Plotly Demo</title>
      <style>
      body{
        background-color: #8ad6f2;
      }
    </style>
     <script src="https://cdn.plot.ly/plotly-3.6.0.min.js" charset="utf-8"></script>
  </head>
  <body>
    <center>
      <h1>My First Plotly Plot</h1>
      <div id="plot"></div>
      <p><a href="index.html">Return to the Home Page</a></p>
      <hr>
      <p>&copy; STEM PREP 2026</p>
    </center>
  <script>
    var trace = {
      x: [1, 2, 3, 4, 5],
      y: [23, 57, 77, 95, 85],
      mode: 'lines'
    };

    var data = [trace];
    var layout = {title: "My First Plot"};

    Plotly.newPlot('plot', data, layout);
    
  </script>
  </body>
</html>
